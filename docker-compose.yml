version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torax_radiography_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - microservice
    restart: unless-stopped
    
  microservice:
    build:
      context: ./ai_microservice
      dockerfile: Dockerfile
    container_name: torax_radiography_microservice
    ports:
    - "8000:8000"
    volumes: 
      - ./ai_microservice:/app
    command: flask run --host=0.0.0.0 --port=8000 --reload
    environment:
      - FLASK_APP=src.main.main
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
  
  frontend:
    build: ./frontend
    container_name: torax_radiography_frontend
    restart: always
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules